                      <div style={{ fontSize: 9, color: C.muted, marginTop: 3 }}>{isSubmitted ? "100% complete" : "65% complete"}</div>
                    </div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.muted, marginBottom: 6, textTransform: "uppercase" }}>Messages</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 7, marginBottom: 12 }}>
                      {activeMessages.map((m, i) => (
                        <div key={i} style={{ alignSelf: m.from === "cm" ? "flex-end" : "flex-start", maxWidth: "85%", background: m.from === "cm" ? C.g50 : C.surface, color: m.from === "cm" ? C.g700 : C.muted, borderRadius: 9, padding: "8px 10px", fontSize: 10, lineHeight: 1.5 }}>{m.text}</div>
                      ))}
                    </div>

                    {isSubmitted ? (
                      <div style={{ background: C.g50, border: `0.5px solid ${C.g200}`, borderRadius: 10, padding: 12, textAlign: "center" }}>
                        <div style={{ fontSize: 20, marginBottom: 4 }}>✅</div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: C.green, marginBottom: 2 }}>Deliverable submitted!</div>
                        {activeDeliverable && (
                          <div style={{ fontSize: 9, color: C.muted, marginBottom: 6 }}>📎 {activeDeliverable.name} · {fmtSize(activeDeliverable.size)}</div>
                        )}
                        <div style={{ fontSize: 10, color: C.muted, marginBottom: 10 }}>Badge pending NGO review.</div>
                        <Btn variant="outline" onClick={() => setScreen("portfolio")}>View in portfolio →</Btn>
                      </div>
                    ) : (
                      <>
                        {activeMessages.length < 2 && <Btn variant="outline" onClick={sendUpdate} style={{ marginBottom: 10 }}>Send progress update</Btn>}
                        <DeliverableInput file={file} setFile={setFile} pickedType={pickedType} setPickedType={setPickedType} note={completionNote} setNote={setCompletionNote} />
                        <Btn disabled={!file} onClick={submitDeliverable}>{file ? "📎 Submit Deliverable" : "Choose a file to submit"}</Btn>
                      </>
                    )}
                    <div style={{ height: 16 }} />
                  </>
                )}
              </Scroll>
              <NavBar active="workspace" onNav={setScreen} />
            </>
          )}

          {/* ─── PORTFOLIO ─── */}
          {screen === "portfolio" && (() => {
            const totalHours = state.badges.reduce((sum, b) => sum + (b.hours || 0), 0);
            const endorsedCount = state.badges.filter((b) => b.status === "endorsed").length;
            return (
              <>
                <Header
                  title="My Portfolio"
                  right={
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <NotifBell count={unreadCount} onClick={() => setNotifOpen(true)} />
                      <button onClick={() => exportPortfolio(profile, state.badges)} style={{ background: C.gold, border: "none", color: C.g900, fontSize: 10, fontWeight: 800, padding: "5px 11px", borderRadius: 14, cursor: "pointer" }}>
                        📄 Export
                      </button>
                    </div>
                  }
                />
                <Scroll style={{ padding: 0 }}>
                  {/* Hero */}
                  <div style={{ background: `linear-gradient(135deg, ${C.g900} 0%, ${C.g700} 100%)`, padding: "18px 16px 18px", color: "#fff", position: "relative", overflow: "hidden" }}>
                    <div style={{ position: "absolute", top: -20, right: -20, width: 100, height: 100, borderRadius: "50%", background: "rgba(245,200,66,0.06)" }} />
                    <div style={{ position: "absolute", bottom: -30, left: -20, width: 80, height: 80, borderRadius: "50%", background: "rgba(168,223,191,0.05)" }} />
                    <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 14, position: "relative" }}>
                      <div style={{ padding: 2, borderRadius: "50%", background: `linear-gradient(135deg, ${C.gold}, ${C.goldBorder})` }}>
                        <Avatar photo={profile.photo} name={profile.name} size={52} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 800, color: "#fff", lineHeight: 1.2 }}>{profile.name || "Corps Member"}</div>
                        <div style={{ fontSize: 10, color: C.g200, marginTop: 3 }}>{profile.discipline || "—"} · NYSC {profile.stateCode || "—"}</div>
                      </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, position: "relative" }}>
                      {[[state.badges.length, "Sprints"], [endorsedCount, "Endorsed"], [totalHours, "Hours"]].map(([n, l]) => (
                        <div key={l} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 9, padding: "9px 6px", textAlign: "center", border: "1px solid rgba(255,255,255,0.14)" }}>
                          <div style={{ fontSize: 20, fontWeight: 800, color: C.gold, lineHeight: 1 }}>{n}</div>
                          <div style={{ fontSize: 8, color: C.g200, marginTop: 3, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 600 }}>{l}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{ padding: 12 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.muted, textTransform: "uppercase", marginBottom: 9, letterSpacing: "0.06em" }}>Verified Achievements</div>
                    {state.badges.length === 0 ? (
                      <div style={{ textAlign: "center", padding: "30px 0", color: C.muted, background: C.g50, borderRadius: 10, border: `1px dashed ${C.border}`, marginBottom: 12 }}>
                        <div style={{ fontSize: 30, marginBottom: 6 }}>🏅</div>
                        <div style={{ fontSize: 11, fontWeight: 600 }}>No achievements yet</div>
                        <div style={{ fontSize: 10, marginTop: 3 }}>Apply to a sprint to start earning badges.</div>
                      </div>
                    ) : state.badges.map((b, i) => {
                      const endorsed = b.status === "endorsed";
                      return (
                        <div key={i} style={{ background: "#fff", borderRadius: 12, padding: 12, marginBottom: 9, border: `1px solid ${endorsed ? C.g200 : C.border}`, position: "relative", overflow: "hidden" }}>
                          {endorsed && <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: 3, background: `linear-gradient(180deg, ${C.gold}, ${C.goldBorder})` }} />}
                          <div style={{ display: "flex", gap: 11, alignItems: "flex-start" }}>
                            <BadgeMedal sector={b.sector} status={b.status} size={60} />
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6, marginBottom: 3 }}>
                                <div style={{ fontSize: 9, fontWeight: 700, color: C.g700, textTransform: "uppercase", letterSpacing: "0.04em" }}>{b.ngo}</div>
                                {endorsed
                                  ? <span style={{ background: C.g900, color: C.gold, fontSize: 8, fontWeight: 800, padding: "2px 6px", borderRadius: 6, whiteSpace: "nowrap" }}>⭐ Endorsed</span>
                                  : <span style={{ background: C.goldBg, color: C.goldDark, fontSize: 8, fontWeight: 800, padding: "2px 6px", borderRadius: 6, border: `0.5px solid ${C.goldBorder}`, whiteSpace: "nowrap" }}>⏳ Pending</span>}
                              </div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: C.g900, lineHeight: 1.3, marginBottom: 6 }}>{b.title}</div>
                              <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 5 }}>{(b.tags || []).map((t) => <Tag key={t}>{t}</Tag>)}</div>
                              {(b.hours || b.date) && (
                                <div style={{ fontSize: 9, color: C.hint, display: "flex", gap: 10 }}>
                                  {b.hours ? <span>⏱ {b.hours} hrs</span> : null}
                                  {b.date ? <span>📅 {new Date(b.date).toLocaleDateString("en-NG", { month: "short", year: "numeric" })}</span> : null}
                                </div>
                              )}
                            </div>
                          </div>
                          {b.endorsement && (
                            <div style={{ fontSize: 10.5, color: C.muted, fontStyle: "italic", lineHeight: 1.5, borderLeft: `2px solid ${C.green}`, paddingLeft: 9, marginTop: 9 }}>
                              "{b.endorsement}"
                            </div>
                          )}
                        </div>
                      );
                    })}

                    <div style={{ background: "#fff", border: `0.5px solid ${C.border}`, borderRadius: 10, padding: 12, marginTop: 6, marginBottom: 10 }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: C.muted, textTransform: "uppercase", marginBottom: 6 }}>Share your feedback</div>
                      {state.feedbackSent ? (
                        <div style={{ background: C.g50, border: `0.5px solid ${C.g200}`, borderRadius: 8, padding: "10px 12px", textAlign: "center" }}>
                          <div style={{ fontSize: 14, marginBottom: 2 }}>💚</div>
                          <div style={{ fontSize: 11, fontWeight: 700, color: C.green }}>Thanks for your feedback!</div>
                        </div>
                      ) : (
                        <>
                          <textarea value={feedback} onChange={(e) => setFeedback(e.target.value)} placeholder="How is ImpactSprint working for you?"
                            style={{ width: "100%", height: 64, borderRadius: 8, border: `1px solid ${feedback ? C.green : C.border}`, padding: "8px 10px", fontSize: 11, resize: "none", outline: "none", boxSizing: "border-box", marginBottom: 8 }} />
                          <Btn disabled={!feedback.trim()} onClick={() => {
                            sendNotification({ kind: "feedback", name: profile.name, email: profile.email, feedback });
                            update({ feedbackSent: true });
                          }}>
                            {feedback.trim() ? "Send feedback" : "Type something to send"}
                          </Btn>
                        </>
                      )}
                    </div>
                    <Btn variant="gold" onClick={() => exportPortfolio(profile, state.badges)}>📄 Export portfolio as PDF</Btn>
                    <div style={{ fontSize: 10, color: C.hint, textAlign: "center", marginTop: 8, lineHeight: 1.5 }}>
                      Opens a printable view. Choose "Save as PDF" in your browser's print dialog.
                    </div>
                    <div style={{ height: 16 }} />
                  </div>
                </Scroll>
                <NavBar active="portfolio" onNav={setScreen} />
              </>
            );
          })()}

          {/* ─── PROFILE ─── */}
          {screen === "profile" && (
            <>
              <Header
                title="My Profile"
                right={
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {!editingProfile && <NotifBell count={unreadCount} onClick={() => setNotifOpen(true)} />}
                    {editingProfile
                      ? <button onClick={saveEdit} style={{ background: C.green, color: "#fff", border: "none", borderRadius: 16, padding: "5px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Save</button>
                      : <button onClick={startEdit} style={{ background: "none", color: C.g200, border: `1px solid ${C.g200}`, borderRadius: 16, padding: "5px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Edit</button>}
                  </div>}
              />
              <Scroll style={{ padding: 16 }}>
                {(() => {
                  const p = editingProfile ? draft : profile;
                  const pct = profileCompleteness(p);
                  const missing = [
                    !p.photo && "a photo",
                    !p.bio && "a bio",
                    !isPhoneValid(p.phone) && "phone",
                    (p.skills || []).length < 3 && `${3 - (p.skills || []).length} more skill${(p.skills || []).length === 2 ? "" : "s"}`,
                  ].filter(Boolean).slice(0, 2);
                  return (
                    <div style={{ background: pct === 100 ? C.g50 : "#fff", border: `1px solid ${pct === 100 ? C.g200 : C.border}`, borderRadius: 12, padding: 11, marginBottom: 14 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                          {pct === 100 ? "✓ Profile complete" : "Profile completeness"}
                        </div>
                        <div style={{ fontSize: 12, fontWeight: 800, color: pct === 100 ? C.green : pct >= 60 ? C.goldDark : C.muted }}>{pct}%</div>
                      </div>
                      <div style={{ height: 6, background: C.g200, borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg, ${C.green}, ${C.gold})`, borderRadius: 3, transition: "width .4s" }} />
                      </div>
                      {pct < 100 && missing.length > 0 && (
                        <div style={{ fontSize: 9, color: C.hint, marginTop: 6, lineHeight: 1.5 }}>
                          Stronger profiles get 3× more NGO views. Add {missing.join(" and ")}.
                        </div>
                      )}
                    </div>
                  );
                })()}
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 18 }}>
                  <Avatar photo={(editingProfile ? draft : profile).photo} name={(editingProfile ? draft : profile).name} size={80} />
                  {editingProfile && (
                    <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                      <PhotoButton label={draft.photo ? "Change photo" : "Upload photo"} onChange={(e) => handlePhoto(e, "draft")} />
                      {draft.photo && (
                        <button onClick={() => setDraft({ ...draft, photo: null })} style={{ background: C.redBg, color: C.red, border: `1px solid ${C.redBorder}`, borderRadius: 16, padding: "6px 14px", fontSize: 10, fontWeight: 700, cursor: "pointer" }}>Remove</button>
                      )}
                    </div>
                  )}
                  {!editingProfile && (
                    <>
                      <div style={{ fontSize: 16, fontWeight: 800, color: C.g900, marginTop: 10 }}>{profile.name || "Your name"}</div>
                      <div style={{ fontSize: 11, color: C.muted }}>{profile.discipline || "—"} · {profile.stateCode || "—"}</div>
                    </>
                  )}
                </div>

                {editingProfile ? (
                  <>
                    <Field label="Full Name" value={draft.name} onChange={(v) => setDraft({ ...draft, name: v })} valid={!!draft.name} />
                    <Field label="Email" type="email" value={draft.email} onChange={(v) => setDraft({ ...draft, email: v })} valid={/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(draft.email)} />
                    {(() => { const ok = isPhoneValid(draft.phone); return (
                    <Field label="Phone Number" type="tel" value={draft.phone || ""} onChange={(v) => setDraft({ ...draft, phone: v })} placeholder="e.g. 08012345678 or +2348012345678" valid={ok} error={draft.phone && !ok ? "Use a Nigerian mobile: 080… 081… 070… 090… 091…" : ""} hint={ok ? "Phone format valid" : ""} />
                    ); })()}
                    {(() => { const dc = validateStateCode(draft.stateCode); return (
                    <Field label="NYSC State Code" value={draft.stateCode} onChange={(v) => setDraft({ ...draft, stateCode: v.toUpperCase() })} placeholder="e.g. LA/23A/1234" valid={dc.valid} error={dc.error} hint={dc.valid ? `${dc.state} State` : ""} />
                    ); })()}
                    <label style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 6 }}>Discipline</label>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                      {["Law", "Engineering", "Health", "Finance", "Arts", "Sciences"].map((d) => {
                        const on = draft.discipline === d;
                        return <div key={d} onClick={() => setDraft({ ...draft, discipline: d })} style={{ padding: "6px 13px", borderRadius: 16, cursor: "pointer", fontSize: 11, fontWeight: on ? 700 : 400, background: on ? C.g50 : "#fff", border: `1px solid ${on ? C.green : C.border}`, color: on ? C.green : C.muted }}>{d}</div>;
                      })}
                    </div>
                    <label style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 4 }}>Short bio</label>
                    <textarea value={draft.bio} onChange={(e) => setDraft({ ...draft, bio: e.target.value })} placeholder="A sentence about yourself and your goals."
                      style={{ width: "100%", height: 56, borderRadius: 10, border: `1px solid ${C.border}`, padding: "9px 12px", resize: "none", outline: "none", boxSizing: "border-box", marginBottom: 12 }} />
                    <label style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 6 }}>Skills</label>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                      {ALL_SKILLS.map((s) => {
                        const on = draft.skills.includes(s);
                        return <div key={s} onClick={() => toggleDraftSkill(s)} style={{ padding: "5px 11px", borderRadius: 16, fontSize: 10, cursor: "pointer", fontWeight: on ? 700 : 400, background: on ? C.g50 : "#fff", border: `1px solid ${on ? C.green : C.border}`, color: on ? C.green : C.muted }}>{s}</div>;
                      })}
                    </div>
                    <label style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 4 }}>Weekly availability: <strong style={{ color: C.g900 }}>{draft.hours} hrs</strong></label>
                    <input type="range" min="2" max="20" value={draft.hours} onChange={(e) => setDraft({ ...draft, hours: +e.target.value })} style={{ width: "100%", marginBottom: 14, accentColor: C.green }} />
                    <Btn variant="ghost" onClick={() => setEditingProfile(false)}>Cancel</Btn>
                  </>
                ) : (
                  <>
                    <Card label="About">{profile.bio || <span style={{ color: C.hint }}>No bio yet — tap Edit to add one.</span>}</Card>
                    <Card label="Contact">
                      <div>✉ {profile.email || "—"}</div>
                      <div style={{ marginTop: 3 }}>📱 {profile.phone || <span style={{ color: C.hint }}>No phone — tap Edit to add</span>}</div>
                      <div style={{ marginTop: 3 }}>🪪 {profile.stateCode || "—"}</div>
                    </Card>
                    <Card label="Skills">{profile.skills.length ? <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>{profile.skills.map((s) => <Tag key={s}>{s}</Tag>)}</div> : <span style={{ color: C.hint, fontSize: 11 }}>No skills added yet.</span>}</Card>
                    <Card label="Availability">⏱ {profile.hours} hours per week</Card>
                    <div style={{ height: 8 }} />
                    <Btn variant="danger" onClick={resetDemo}>Sign out & reset demo</Btn>
                  </>
                )}
                <div style={{ height: 16 }} />
              </Scroll>
              <NavBar active="profile" onNav={setScreen} />
            </>
          )}
        </Phone>

        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, maxWidth: 380, textAlign: "center" }}>
          <div style={{ fontSize: 11, color: C.hint, lineHeight: 1.6 }}>
            Demo data saves to your browser only. <button onClick={resetDemo} style={{ background: "none", border: "none", color: C.green, fontWeight: 600, cursor: "pointer", padding: 0, fontSize: 11 }}>Reset demo</button>
          </div>
        </div>
      </div>
    );
  }

  const Lbl = ({ children }) => (
    <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 5 }}>{children}</div>
  );

  const Card = ({ label, children }) => (
    <div style={{ background: C.surface, borderRadius: 10, padding: 12, border: `0.5px solid ${C.border}`, marginBottom: 10 }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: C.muted, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 12, color: C.text, lineHeight: 1.6 }}>{children}</div>
    </div>
  );

  function PhotoButton({ label, onChange }) {
    const ref = useRef();
    return (
      <>
        <input ref={ref} type="file" accept="image/*" onChange={onChange} style={{ display: "none" }} />
        <button onClick={() => ref.current?.click()} style={{ background: C.green, color: "#fff", border: "none", borderRadius: 16, padding: "6px 14px", fontSize: 10, fontWeight: 700, cursor: "pointer" }}>{label}</button>
      </>
    );
  }

  function DeliverableInput({ file, setFile, pickedType, setPickedType, note, setNote }) {
    const ref = useRef();
    return (
      <div style={{ background: "#fff", border: `0.5px solid ${C.border}`, borderRadius: 10, padding: 12, marginBottom: 10 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: C.muted, textTransform: "uppercase", marginBottom: 8 }}>Submit your deliverable</div>
        <div style={{ fontSize: 10, color: C.muted, marginBottom: 6 }}>File type</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 10 }}>
          {FILE_TYPES.map((ft) => {
            const on = pickedType.ext === ft.ext;
            return (
              <button key={ft.ext} onClick={() => { setPickedType(ft); setFile(null); }} style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 9px", borderRadius: 14, fontSize: 10, fontWeight: on ? 700 : 400, cursor: "pointer", background: on ? C.g50 : C.surface, border: `1px solid ${on ? C.green : C.border}`, color: on ? C.green : C.muted }}>
                <span>{ft.icon}</span>{ft.ext}
              </button>
            );
          })}
        </div>
        <input ref={ref} type="file" accept={pickedType.accept} onChange={(e) => e.target.files?.[0] && setFile(e.target.files[0])} style={{ display: "none" }} />
        <div onClick={() => ref.current?.click()} style={{ border: `1.5px dashed ${file ? C.green : C.border}`, borderRadius: 10, padding: "14px 10px", textAlign: "center", cursor: "pointer", background: file ? C.g50 : C.surface, marginBottom: 10 }}>
          {file ? (
            <>
              <div style={{ fontSize: 20, marginBottom: 3 }}>{pickedType.icon}</div>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.g900 }}>{file.name}</div>
              <div style={{ fontSize: 9, color: C.muted, marginTop: 1 }}>{fmtSize(file.size)} · tap to change</div>
            </>
          ) : (
            <>
              <div style={{ fontSize: 22, marginBottom: 3 }}>{pickedType.icon}</div>
              <div style={{ fontSize: 11, color: C.muted }}>Tap to choose a {pickedType.ext} file</div>
            </>
          )}
        </div>
        <label style={{ fontSize: 10, color: C.muted, display: "block", marginBottom: 4 }}>Completion note (optional)</label>
        <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="Anything the NGO should know…"
          style={{ width: "100%", height: 48, borderRadius: 8, border: `1px solid ${C.border}`, padding: "7px 9px", fontSize: 10, resize: "none", outline: "none", boxSizing: "border-box" }} />
      </div>
    );
  }

  // ─── Badge medallion ─────────────────────────────────────────────────────
  const SECTOR_BADGE = {
    Legal:     { icon: "⚖️", color: "#1A4D8C", bg: "#E3EEF7", ribbon: "#1A4D8C" },
    Health:    { icon: "❤️", color: "#B83228", bg: "#FEF0EE", ribbon: "#B83228" },
    Education: { icon: "📚", color: "#7A4F10", bg: "#FDF6E3", ribbon: "#7A4F10" },
  };

  function BadgeMedal({ sector, status, size = 60 }) {
    const conf = SECTOR_BADGE[sector] || { icon: "✨", color: "#1A5C35", bg: "#EBF7F1", ribbon: "#1A5C35" };
    const endorsed = status === "endorsed";
    return (
      <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
        <svg width={size} height={size} viewBox="0 0 100 100" style={{ position: "absolute", inset: 0 }}>
          {endorsed && (
            <g>
              <polygon points="22,76 30,98 50,82" fill={conf.ribbon} opacity="0.85" />
              <polygon points="78,76 70,98 50,82" fill="#1A8C4E" opacity="0.85" />
              <polygon points="40,82 50,100 60,82" fill="#0A1F10" />
            </g>
          )}
          <circle cx="50" cy="44" r="40" fill={conf.bg} stroke={endorsed ? "#C9962A" : "#A8DFBF"} strokeWidth={endorsed ? "3.5" : "2.5"} strokeDasharray={endorsed ? "" : "5 3"} />
          {endorsed && <circle cx="50" cy="44" r="35" fill="none" stroke="#F5C842" strokeWidth="1.5" />}
          <circle cx="50" cy="44" r="30" fill="#fff" stroke={conf.color} strokeWidth="1.5" />
        </svg>
        <div style={{ position: "absolute", top: 0, left: 0, width: size, height: size * 0.88, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.32, pointerEvents: "none" }}>
          {conf.icon}
        </div>
        {endorsed && (
          <div style={{ position: "absolute", top: "4%", right: "2%", width: size * 0.26, height: size * 0.26, borderRadius: "50%", background: "linear-gradient(135deg, #F5C842, #C9962A)", display: "flex", alignItems: "center", justifyContent: "center", color: "#7A4F10", fontSize: size * 0.14, fontWeight: 900, boxShadow: "0 1px 2px rgba(0,0,0,0.25)", border: "1.5px solid #fff" }}>
            ★
          </div>
        )}
      </div>
    );
  }

  // ─── PDF export (opens a printable HTML view) ───────────────────────────
  function exportPortfolio(profile, badges) {
    const w = window.open("", "_blank", "width=820,height=1000");
    if (!w) {
      alert("Please allow popups for this site to export your portfolio.");
      return;
    }
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]);
    const totalHours = badges.reduce((sum, b) => sum + (b.hours || 0), 0);
    const endorsedCount = badges.filter((b) => b.status === "endorsed").length;
    const sectorMap = {
      Legal:     { color: "#1A4D8C", bg: "#E3EEF7", icon: "⚖️" },
      Health:    { color: "#B83228", bg: "#FEF0EE", icon: "❤️" },
      Education: { color: "#7A4F10", bg: "#FDF6E3", icon: "📚" },
    };
    const html = `<!DOCTYPE html>
<html><head><meta charset="utf-8" />
<title>${esc(profile.name || "Corps Member")} — ImpactSprint Portfolio</title>
<style>
  @page { size: A4; margin: 1.2cm; }
  @media print { .no-print { display: none !important; } body { background: #fff !important; padding: 0 !important; } }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; color: #0A1F10; max-width: 780px; margin: 0 auto; padding: 28px; background: #F5FBF7; line-height: 1.45; }
  .no-print { position: sticky; top: 12px; z-index: 10; background: linear-gradient(135deg, #1A8C4E, #1A5C35); color: #fff; padding: 14px 18px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 22px; box-shadow: 0 6px 18px rgba(26,140,78,0.3); }
  .no-print .btn { background: #fff; color: #1A8C4E; border: none; padding: 9px 18px; border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 13px; }
  .header { background: linear-gradient(135deg, #0A1F10, #1A5C35); color: #fff; border-radius: 18px; padding: 28px; margin-bottom: 22px; position: relative; overflow: hidden; }
  .header::before { content: ""; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(245,200,66,0.08); }
  .header::after { content: ""; position: absolute; bottom: -50px; left: -30px; width: 140px; height: 140px; border-radius: 50%; background: rgba(168,223,191,0.06); }
  .header-row { display: flex; gap: 22px; align-items: center; position: relative; }
  .avatar-ring { padding: 3px; border-radius: 50%; background: linear-gradient(135deg, #F5C842, #C9962A); flex-shrink: 0; }
  .avatar { width: 84px; height: 84px; border-radius: 50%; background: #1A8C4E; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .name { font-size: 28px; font-weight: 800; margin: 0; line-height: 1.1; }
  .subtitle { color: #A8DFBF; margin: 6px 0 0; font-size: 13px; }
  .bio { color: #EBF7F1; margin: 10px 0 0; font-size: 12px; line-height: 1.5; max-width: 480px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; position: relative; }
  .stat { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 13px 10px; text-align: center; }
  .stat-n { font-size: 26px; font-weight: 800; color: #F5C842; line-height: 1; }
  .stat-l { font-size: 9px; color: #A8DFBF; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; font-weight: 600; }
  .section-title { font-size: 11px; font-weight: 700; color: #4A6B56; text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 14px; }
  .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .badge { background: #fff; border: 1px solid #D4EDE0; border-radius: 14px; padding: 16px; page-break-inside: avoid; position: relative; overflow: hidden; }
  .badge.endorsed::before { content: ""; position: absolute; top: 0; left: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, #F5C842, #C9962A); }
  .badge-head { display: flex; gap: 12px; align-items: flex-start; }
  .medal { width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 2.5px solid; flex-shrink: 0; position: relative; }
  .medal.endorsed { border-color: #C9962A; box-shadow: 0 0 0 1.5px #F5C842 inset; }
  .medal .star { position: absolute; top: -2px; right: -2px; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #F5C842, #C9962A); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #7A4F10; border: 1.5px solid #fff; font-weight: 900; }
  .ngo { font-weight: 700; font-size: 10px; color: #1A5C35; text-transform: uppercase; letter-spacing: 0.05em; }
  .title { font-size: 13px; font-weight: 800; margin: 4px 0 7px; line-height: 1.3; color: #0A1F10; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 7px; }
  .tag { background: #EBF7F1; color: #1A5C35; font-size: 9px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .meta { font-size: 10px; color: #8AAD96; display: flex; gap: 12px; }
  .quote { font-style: italic; color: #4A6B56; font-size: 11px; line-height: 1.55; border-left: 2.5px solid #1A8C4E; padding: 4px 0 4px 11px; margin-top: 11px; }
  .endorsed-tag { background: #0A1F10; color: #F5C842; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 6px; display: inline-block; margin-left: 6px; vertical-align: middle; }
  .pending-tag { background: #FDF6E3; color: #7A4F10; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 6px; display: inline-block; margin-left: 6px; vertical-align: middle; border: 1px solid #C9962A; }
  .footer { text-align: center; margin-top: 32px; padding-top: 20px; border-top: 1px solid #D4EDE0; color: #8AAD96; font-size: 10px; line-height: 1.6; }
  .footer strong { color: #1A8C4E; }
  .empty { text-align: center; padding: 50px 20px; color: #8AAD96; background: #fff; border: 1px dashed #D4EDE0; border-radius: 14px; }
</style>
</head><body>
<div class="no-print">
  <div>
    <div style="font-size:14px;font-weight:800;">Your portfolio is ready</div>
    <div style="font-size:11px;opacity:0.9;margin-top:2px;">Save as PDF, print, or share this page's URL</div>
  </div>
  <button class="btn" onclick="window.print()">📄 Save as PDF</button>
</div>
<div class="header">
  <div class="header-row">
    <div class="avatar-ring"><div class="avatar">${profile.photo ? `<img src="${esc(profile.photo)}" />` : esc((profile.name || "?")[0].toUpperCase())}</div></div>
    <div style="min-width:0;">
      <h1 class="name">${esc(profile.name || "Corps Member")}</h1>
      <div class="subtitle">${esc(profile.discipline || "—")} · NYSC ${esc(profile.stateCode || "—")}${profile.email ? ` · ${esc(profile.email)}` : ""}</div>
      ${profile.bio ? `<div class="bio">${esc(profile.bio)}</div>` : ""}
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n">${badges.length}</div><div class="stat-l">Sprints</div></div>
    <div class="stat"><div class="stat-n">${endorsedCount}</div><div class="stat-l">Endorsed</div></div>
    <div class="stat"><div class="stat-n">${totalHours}</div><div class="stat-l">Hours Logged</div></div>
  </div>
</div>
<h2 class="section-title">Verified Achievements</h2>
${badges.length === 0 ? `
  <div class="empty">
    <div style="font-size:42px;margin-bottom:10px;">🏅</div>
    <div style="font-size:14px;font-weight:700;">No achievements yet</div>
    <div style="font-size:11px;margin-top:5px;">Apply to a sprint to start earning verified badges.</div>
  </div>` : `
  <div class="badge-grid">
    ${badges.map((b) => {
      const sm = sectorMap[b.sector] || { color: "#1A5C35", bg: "#EBF7F1", icon: "✨" };
      const endorsed = b.status === "endorsed";
      return `<div class="badge ${endorsed ? "endorsed" : ""}">
        <div class="badge-head">
          <div class="medal ${endorsed ? "endorsed" : ""}" style="background:${sm.bg};color:${sm.color};">${sm.icon}${endorsed ? '<div class="star">★</div>' : ""}</div>
          <div style="flex:1;min-width:0;">
            <div><span class="ngo">${esc(b.ngo)}</span>${endorsed ? '<span class="endorsed-tag">⭐ Endorsed</span>' : '<span class="pending-tag">⏳ Pending</span>'}</div>
            <div class="title">${esc(b.title)}</div>
            <div class="tags">${(b.tags || []).map((t) => `<span class="tag">${esc(t)}</span>`).join("")}</div>
            <div class="meta">
              ${b.hours ? `<span>⏱ ${esc(b.hours)} hrs</span>` : ""}
              ${b.date ? `<span>📅 ${new Date(b.date).toLocaleDateString("en-NG", { month: "short", year: "numeric" })}</span>` : ""}
            </div>
          </div>
        </div>
        ${b.endorsement ? `<div class="quote">"${esc(b.endorsement)}"</div>` : ""}
      </div>`;
    }).join("")}
  </div>`}
<div class="footer">
  Generated from <strong>ImpactSprint</strong> · ${new Date().toLocaleDateString("en-NG", { year: "numeric", month: "long", day: "numeric" })}<br>
  Verified by NGO partners · Public portfolio shareable with employers
</div>
</body></html>`;
    w.document.open();
    w.document.write(html);
    w.document.close();
  }

  function NotifBell({ count, onClick }) {
    return (
      <button onClick={onClick} style={{ background: "none", border: `1px solid ${C.g200}`, borderRadius: "50%", width: 28, height: 28, padding: 0, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}>
        <span style={{ fontSize: 13, lineHeight: 1 }}>🔔</span>
        {count > 0 && (
          <span style={{ position: "absolute", top: -3, right: -3, background: C.red, color: "#fff", fontSize: 8, fontWeight: 800, padding: "1px 4px", borderRadius: 8, minWidth: 13, height: 13, display: "flex", alignItems: "center", justifyContent: "center", border: "1.5px solid #fff" }}>
            {count > 9 ? "9+" : count}
          </span>
        )}
      </button>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
